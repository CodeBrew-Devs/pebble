# Exported from Render on 2026-03-15T20:26:15Z
version: "1"
projects:
  - name: pebble
    environments:
      - name: dev
        services:
          - type: web
            name: pebble_backend
            runtime: rust
            repo: https://github.com/CodeBrew-Devs/pebble
            plan: free
            envVars:
              - key: SERVER_PORT
                sync: false
              - key: JWT_EXPIRY_HOURS
                sync: false
              - key: JWT_SECRET
                sync: false
              - key: DATABASE_URL
                fromDatabase:
                  name: pebble-psql
                  property: connectionString
            region: oregon
            buildCommand: cargo build --release
            startCommand: cargo run --release
            healthCheckPath: /health
            autoDeployTrigger: "off"
            rootDir: backend/
          - type: web
            name: pebble_frontend
            runtime: static
            repo: https://github.com/CodeBrew-Devs/pebble
            envVars:
              - key: VITE_API_URL
                sync: false
            buildCommand: npm install; npm run build
            staticPublishPath: dist
            routes:
              - type: rewrite
                source: /*
                destination: /index.html
            autoDeployTrigger: "off"
            rootDir: frontend/
        databases:
          - name: pebble-psql
            databaseName: pebble_f7js
            user: pebble_dev
            plan: free
            region: oregon
            ipAllowList:
              - source: 74.220.48.0/24
                description: backend static ip 1
              - source: 74.220.56.0/24
                description: backend static ip 2
            postgresMajorVersion: "18"
